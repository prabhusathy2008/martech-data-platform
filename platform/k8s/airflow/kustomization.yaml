apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: airflow-secret
    namespace: airflow
    envs:
      - airflow-secret.env
resources:
  - airflow-namespace.yaml
  - airflow-serviceaccount.yaml
  - airflow-pvc.yaml
  - airflow-deployment.yaml
  - airflow-service.yaml