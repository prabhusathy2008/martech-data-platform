apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: airflow
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      serviceAccountName: airflow-sa
      containers:
        - name: airflow
          image: apache/airflow:2.9.3-python3.11
          imagePullPolicy: IfNotPresent
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: sqlite:////opt/airflow/data/airflow.db
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL
              value: "30"
            - name: AIRFLOW_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: AIRFLOW_ADMIN_USERNAME
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: AIRFLOW_ADMIN_PASSWORD
            - name: _PIP_ADDITIONAL_REQUIREMENTS
              value: apache-airflow-providers-cncf-kubernetes==8.4.2 kubernetes==29.0.0 pendulum==3.0.0
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail

              echo "Running DB migrations..."
              airflow db migrate

              if airflow users list | grep -q "$AIRFLOW_ADMIN_USERNAME"; then
                echo "Airflow admin user '$AIRFLOW_ADMIN_USERNAME' exists."
                echo "Resetting admin password..."
                airflow users reset-password \
                  --username "$AIRFLOW_ADMIN_USERNAME" \
                  --password "$AIRFLOW_ADMIN_PASSWORD"
              else
                echo "Creating admin user..."
                airflow users create \
                  --role Admin \
                  --username "$AIRFLOW_ADMIN_USERNAME" \
                  --password "$AIRFLOW_ADMIN_PASSWORD" \
                  --firstname Air \
                  --lastname Flow \
                  --email admin@example.com
              fi
              exec airflow standalone
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: airflow-data
              mountPath: /opt/airflow/data
            - name: airflow-data
              mountPath: /opt/airflow/logs
            - name: dags
              mountPath: /opt/airflow/dags
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 60
      volumes:
        - name: airflow-data
          persistentVolumeClaim:
            claimName: airflow-data
        - name: dags
          hostPath:
            path: /airflow-dags
            type: DirectoryOrCreate
