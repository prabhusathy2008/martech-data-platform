apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: minio-secret
    namespace: data-platform
    envs:
      - minio-secret.env
resources:
  - minio-pvc.yaml
  - minio-service.yaml
  - minio-deployment.yaml
  - minio-bootstrap.yaml
