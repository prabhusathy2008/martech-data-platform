version: 2

models:
  - name: int_events_enriched
    description: >
      Enriched event data with business attributes.
      Adds temporal binning (event_date), meaningful action flag,
      and action weight scoring for engagement analytics.
    columns:
      - name: event_id
        description: Unique GitHub event ID.
      - name: event_ts
        description: Timestamp the event occurred.
      - name: event_date
        description: Calendar date of the event.
        tests:
          - not_null
      - name: user_id
        description: GitHub user ID.
      - name: user_login
        description: GitHub username.
      - name: repo_id
        description: GitHub repository ID.
      - name: repo_source
        description: GitHub repository full name.
      - name: event_type
        description: GitHub event type (PUSHEVENT, PULLREQUESTEVENT, etc.).
      - name: payload
        description: Full event payload as JSONB.
      - name: loaded_at
        description: Warehouse load timestamp propagated from staging, used for incremental backfill filtering.
      - name: is_meaningful_action
        description: True if event_type is engagement-relevant (code, PR, issue, etc.).
        tests:
          - not_null
      - name: action_weight
        description: Numeric engagement weight (PushEvent=3, PREvent=5, issues=2, etc.).
        tests:
          - not_null
