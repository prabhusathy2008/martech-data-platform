github_engagement_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', env_var('DEFAULT_POSTGRES_HOST')) }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'martech') }}"
      schema: github_engagement_analytics
      threads: 4
      keepalives_idle: 0
      connect_timeout: 15